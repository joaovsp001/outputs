<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d9f2c9">
  <title>Praga - Survivor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <main id="gameShell" aria-label="Praga">
    <canvas id="gameCanvas"></canvas>

    <section id="hud" class="hud is-hidden" aria-live="polite">
      <div class="hudTop">
        <div class="statBox hpBox">
          <span>HP</span>
          <div class="bar"><i id="hpFill"></i></div>
          <b id="hpText">50/50</b>
        </div>
        <div class="statBox xpBox">
          <span>LV</span>
          <div class="bar"><i id="xpFill"></i></div>
          <b id="levelText">1</b>
        </div>
        <div class="pill" id="timeText">00:00</div>
        <div class="pill" id="killText">0 KOs</div>
        <div class="pill" id="goldText">0 ouro</div>
      </div>
      <div id="loadout" class="loadout"></div>
      <div id="toast" class="toast"></div>
    </section>

    <div id="joystick" class="joystick" aria-hidden="true">
      <div class="joyBase"></div>
      <div id="joyKnob" class="joyKnob"></div>
    </div>

    <div id="sysBtns" class="sysBtns is-hidden">
      <button id="pauseBtn" class="iconBtn" aria-label="Pausar" title="Pausar">II</button>
      <button id="muteBtn" class="iconBtn" aria-label="Som" title="Som">🔊</button>
    </div>

    <section id="menuScreen" class="screen menuScreen">
      <div class="menuHero">
        <p class="eyebrow">Sobreviva ate o amanhecer</p>
        <h1>PRAGA</h1>
        <p class="tagline">A horda desperta sob a luz da mana.</p>
        <div class="heroActions">
          <button id="playButton" class="primaryBtn">Jogar</button>
          <button id="shopOpenButton" class="primaryBtn secondaryBtn">Loja</button>
        </div>
      </div>

      <div id="returningPanel" class="returningPanel">
        <div class="menuControls">
          <section class="mapPanel">
            <h2>Mapa</h2>
            <div id="mapGrid" class="choiceGrid mapGrid"></div>
          </section>
        </div>

        <section class="characterShelf">
          <h2>Personagem</h2>
          <div class="characterShelfScroll">
          <div id="characterGrid" class="choiceGrid"></div>
          </div>
        </section>
      </div>
    </section>

    <section id="shopScreen" class="screen shopScreen is-hidden" aria-label="Loja">
      <div class="shopStage">
        <div class="shopTopbar">
          <button id="shopBackButton" class="ghostBtn">Voltar</button>
          <h2>Loja</h2>
          <div class="manaBadge">Mana <span id="manaText">0</span></div>
        </div>
        <div class="shopBoard">
          <div id="shopGrid" class="shopGrid"></div>
        </div>
      </div>
    </section>

    <section id="levelScreen" class="screen overlayScreen is-hidden">
      <div class="levelWrap">
        <p class="eyebrow">Level up</p>
        <h2>Escolha uma melhoria</h2>
        <div id="cardGrid" class="cardGrid"></div>
      </div>
    </section>

    <section id="endScreen" class="screen overlayScreen is-hidden">
      <div class="endPanel">
        <p id="endEyebrow" class="eyebrow">Run encerrada</p>
        <h2 id="endTitle">Fim da run</h2>
        <div id="endStats" class="endStats"></div>
        <div class="endActions">
          <button id="againButton" class="primaryBtn">Jogar de novo</button>
          <button id="menuButton" class="ghostBtn">Voltar</button>
        </div>
      </div>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
